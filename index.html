<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Gestor de Documentos</title>
</head>
<body>

  <h1>📂 Sistema de Armazenamento de Arquivos</h1>

  <input type="file" id="arquivo">
  <button id="btnEnviar">Enviar</button>

  <h2>Arquivos enviados:</h2>
  <ul id="lista"></ul>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

    // 🔥 COLE AQUI SUAS CREDENCIAIS
    const SUPABASE_URL = "https://skjednebhvcgyyxssforl.supabase.co";
    const SUPABASE_KEY = "sb_publishable_ZEToUIXt08lGBOu8uomDtg_rx8A3ifi";

    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    // 📤 Enviar arquivo
    async function enviar() {
      const file = document.getElementById("arquivo").files[0];

      if (!file) {
        alert("Selecione um arquivo!");
        return;
      }

      const { error } = await supabase.storage
        .from('arquivos')
        .upload(file.name, file);

      if (error) {
        alert("Erro ao enviar: " + error.message);
      } else {
        alert("Arquivo enviado com sucesso!");
        listar();
      }
    }

    document.getElementById("btnEnviar").addEventListener("click", enviar);
    
    // 📋 Listar arquivos
    async function listar() {
      const { data, error } = await supabase.storage
        .from('arquivos')
        .list();

      const lista = document.getElementById("lista");
      lista.innerHTML = "";

      if (error) {
        console.error(error);
        return;
      }

      data.forEach(item => {
        const url = SUPABASE_URL + "/storage/v1/s3/" + item.name; 

        const li = document.createElement("li");
        li.innerHTML = `<a href="${url}" target="_blank">${item.name}</a>`;
        lista.appendChild(li);
      });
    }

    // 🔥 Torna a função acessível ao botão
    window.enviar = enviar;

    // Carrega lista ao abrir
    listar();
  </script>

</body>
</html>
